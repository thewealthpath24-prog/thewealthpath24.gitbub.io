<!DOCTYPE html>
<html>
<head>
  <title>WealthPath</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      background: #020617;
      padding: 15px;
      text-align: center;
    }

    .navbar a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .navbar a:hover {
      color: #38bdf8;
    }

    /* HERO SECTION */
    .hero {
      padding: 80px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #94a3b8;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #38bdf8;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    /* SECTION */
    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px auto;
      width: 300px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>WealthPath</h1>
    <p>Your journey to financial freedom starts here.</p>
    <button class="btn">Get Started</button>
  </div>

  <!-- SECTION -->
  <div class="section">
    <h2>Our Services</h2>

    <div class="card">
      <h3>Investment Planning</h3>
      <p>Grow your money with smart strategies.</p>
    </div>

    <div class="card">
      <h3>Financial Advice</h3>
      <p>Expert guidance for your future.</p>
    </div>

  </div>

</body>
</html>
