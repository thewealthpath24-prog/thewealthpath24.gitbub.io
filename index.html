<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      text-align: center;
      color: white;
      margin: 0;
    }

    .container {
      padding: 50px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 18px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #007bff;
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>Welcome to My Website 👋</h1>
    <p>This is my improved website!</p>

    <div class="card">
      <h2>About Me</h2>
      <p>I am learning web development.</p>
      <button>Contact Me</button>
    </div>
  </div>

</body>
</html>
